org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.parallel=false
org.gradle.workers.max=2
org.gradle.caching=false
android.useAndroidX=true
android.enableJetifier=true

# Fix for Kotlin incremental cache cross-drive issues
kotlin.incremental=false
kotlin.incremental.js=false
kotlin.incremental.multiplatform=false
kotlin.caching.enabled=false

# Disable build cache to avoid cross-drive issues
org.gradle.configuration-cache=false

