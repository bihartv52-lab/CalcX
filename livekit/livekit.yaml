port: 7880
bind_addresses:
  - ""
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 60000
  use_external_ip: true
keys:
  devkey: devsecret
turn:
  enabled: true
  domain: livekit.your-domain.com
  cert_file: /etc/letsencrypt/live/livekit.your-domain.com/fullchain.pem
  key_file: /etc/letsencrypt/live/livekit.your-domain.com/privkey.pem
