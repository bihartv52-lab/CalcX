name: calcx
description: Calculator-first secure social Flutter app foundation.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  supabase_flutter: ^2.12.4
  http: ^1.2.1
  flutter_secure_storage: ^10.2.0
  local_auth: ^3.0.1
  crypto: ^3.0.6
  intl: ^0.20.2
  uuid: ^4.5.1
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  livekit_client: ^2.7.0
  image_picker: ^1.2.0
  file_picker: ^10.3.3
  cached_network_image: ^3.4.1
  better_player_plus: ^1.2.1
  youtube_player_flutter: ^9.1.3
  flutter_dotenv: ^5.2.1
  permission_handler: ^11.3.1
  image: ^4.3.0
  path_provider: ^2.1.5
  share_plus: ^10.1.3
  url_launcher: ^6.3.1
  audioplayers: ^6.1.0
  flutter_inappwebview: ^6.1.5
  record: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

dependency_overrides:
  record_platform_interface: 1.2.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - .env

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#1a1a1a"
  adaptive_icon_foreground: "assets/images/app_icon.png"
